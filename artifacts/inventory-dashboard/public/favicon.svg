<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded background -->
  <rect width="180" height="180" rx="36" fill="#16A34A"/>
  <!-- Box body -->
  <rect x="38" y="78" width="104" height="68" rx="6" fill="white"/>
  <!-- Box top-left flap -->
  <path d="M38 78 L90 60 L90 78 Z" fill="white" opacity="0.75"/>
  <!-- Box top-right flap -->
  <path d="M142 78 L90 60 L90 78 Z" fill="white" opacity="0.55"/>
  <!-- Box center line (flap fold) -->
  <line x1="90" y1="60" x2="90" y2="78" stroke="#16A34A" stroke-width="2"/>
  <!-- Box horizontal tape stripe -->
  <rect x="38" y="105" width="104" height="14" fill="#16A34A" opacity="0.18"/>
  <!-- Upward trend arrow inside box -->
  <polyline points="55,135 75,115 95,125 125,100" stroke="#16A34A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="125,100 113,100 119,112" fill="#16A34A"/>
</svg>
